name: Release Desktop App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Frontend checks
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/desktop
      - run: pnpm build
        working-directory: apps/desktop
      - run: pnpm exec vitest run
        working-directory: apps/desktop
      - run: pnpm run validate:locales
        working-directory: apps/desktop
      - run: pnpm run validate:hooks
        working-directory: apps/desktop

      # Python checks
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-release-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-release-

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt ruff pytest-timeout

      - name: Ruff lint
        run: ruff check backend/
        working-directory: backend

      - name: Unit tests (+ coverage gate 60%)
        run: python -m pytest tests -q --timeout=120 -m "not integration and not benchmark"
        working-directory: backend

      - name: Integration tests
        run: python -m pytest tests -q --timeout=180 -m "integration" || echo "⚠️ Integration tests had failures (non-blocking for release)"
        working-directory: backend

      - name: Benchmark tests
        run: python -m pytest tests -q --timeout=300 -m "benchmark"
        working-directory: backend

  build:
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb

          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure public release metadata
        shell: bash
        env:
          LICENSE_PUBLIC_KEY: ${{ vars.LICENSE_PUBLIC_KEY }}
          RESEARCHMIND_CLOUD_URL: ${{ vars.RESEARCHMIND_CLOUD_URL }}
        run: |
          mkdir -p apps/desktop/src-tauri/resources
          if [ -z "$RESEARCHMIND_CLOUD_URL" ]; then
            echo "RESEARCHMIND_CLOUD_URL repository variable is required"
            exit 1
          fi
          printf '{"url":"%s"}' "$RESEARCHMIND_CLOUD_URL" > apps/desktop/src-tauri/resources/gateway.json
          if [ -z "$LICENSE_PUBLIC_KEY" ]; then
            echo "Repository variable LICENSE_PUBLIC_KEY is required for commercial releases"
            exit 1
          fi
          printf '%s' "$LICENSE_PUBLIC_KEY" > backend/config/license_public_key.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-build-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-build-

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend executable
        run: pyinstaller backend.spec

      - name: Copy backend to Tauri resources
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/resources
          BACKEND_BIN=""
          if [ "${{ runner.os }}" == "Windows" ]; then
            if [ -f dist/backend.exe ]; then
              BACKEND_BIN="dist/backend.exe"
            fi
          elif [ -f dist/backend ]; then
            BACKEND_BIN="dist/backend"
          elif [ -f dist/backend/backend ]; then
            BACKEND_BIN="dist/backend/backend"
          fi

          if [ -z "$BACKEND_BIN" ]; then
            echo "❌ PyInstaller backend binary not found in dist/"
            ls -la dist/ || true
            exit 1
          fi

          SIZE=$(wc -c < "$BACKEND_BIN")
          echo "Backend binary size: $SIZE bytes"
          if [ "$SIZE" -lt 5000000 ]; then
            echo "❌ Backend binary too small ($SIZE bytes) — build likely failed"
            exit 1
          fi

          cp "$BACKEND_BIN" apps/desktop/src-tauri/resources/backend
          cp "$BACKEND_BIN" apps/desktop/src-tauri/resources/backend.exe
          chmod +x apps/desktop/src-tauri/resources/backend || true
          ls -la apps/desktop/src-tauri/resources/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "ResearchMind VN v${{ github.ref_name }}"
          releaseBody: |
            ## ResearchMind VN v${{ github.ref_name }}

            Tải xuống phiên bản phù hợp với hệ điều hành của bạn.
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
