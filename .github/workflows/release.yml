name: Release Desktop App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb

          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: app

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare backend without shared provider credentials
        shell: bash
        run: |
          : > backend/.env
          echo "✅ .env created ($(wc -c < backend/.env) bytes)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend executable
        run: pyinstaller backend.spec

      - name: Copy backend to Tauri resources
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/resources
          BACKEND_BIN=""
          if [ "${{ runner.os }}" == "Windows" ]; then
            if [ -f dist/backend.exe ]; then
              BACKEND_BIN="dist/backend.exe"
            fi
          elif [ -f dist/backend ]; then
            BACKEND_BIN="dist/backend"
          elif [ -f dist/backend/backend ]; then
            BACKEND_BIN="dist/backend/backend"
          fi

          if [ -z "$BACKEND_BIN" ]; then
            echo "❌ PyInstaller backend binary not found in dist/"
            ls -la dist/ || true
            exit 1
          fi

          SIZE=$(wc -c < "$BACKEND_BIN")
          echo "Backend binary size: $SIZE bytes"
          if [ "$SIZE" -lt 5000000 ]; then
            echo "❌ Backend binary too small ($SIZE bytes) — build likely failed"
            exit 1
          fi

          cp "$BACKEND_BIN" apps/desktop/src-tauri/resources/backend
          cp "$BACKEND_BIN" apps/desktop/src-tauri/resources/backend.exe
          chmod +x apps/desktop/src-tauri/resources/backend || true
          ls -la apps/desktop/src-tauri/resources/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "ResearchMind VN v${{ github.ref_name }}"
          releaseBody: |
            ## ResearchMind VN v${{ github.ref_name }}

            Tải xuống phiên bản phù hợp với hệ điều hành của bạn.
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
