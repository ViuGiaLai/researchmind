name: Build ResearchMind Desktop

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/desktop/**"
      - "backend/**"
      - "docs/**"
      - ".github/**"
      - "Cargo.toml"
      - "backend.spec"
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/desktop/src/**'
              - 'apps/desktop/package.json'
              - 'apps/desktop/pnpm-lock.yaml'
              - 'apps/desktop/vite.config.ts'
            backend:
              - 'backend/**'
              - 'backend.spec'
            rust:
              - 'apps/desktop/src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  lint-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/desktop
      - run: npx tsc --noEmit
        working-directory: apps/desktop
      - run: npx vitest run
        working-directory: apps/desktop

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r backend/requirements.txt pytest pytest-timeout
      - run: pytest test_debate.py test_all_exports.py test_docx_export.py test_html_export.py test_pdf_export.py -v --timeout=120

  lint-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies (clippy)
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  build:
    needs: [changes, lint-frontend, test-backend, lint-rust]
    if: github.ref_type == 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend executable
        run: pyinstaller backend.spec

      - name: Copy backend to Tauri resources
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/resources
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp dist/backend.exe apps/desktop/src-tauri/resources/backend.exe
            # Tauri expects both names on all platforms
            cp dist/backend.exe apps/desktop/src-tauri/resources/backend
          elif [ -f dist/backend ]; then
            cp dist/backend apps/desktop/src-tauri/resources/backend
            cp dist/backend apps/desktop/src-tauri/resources/backend.exe
          elif [ -d dist/backend ]; then
            cp dist/backend/backend apps/desktop/src-tauri/resources/backend
            cp dist/backend/backend apps/desktop/src-tauri/resources/backend.exe
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "ResearchMind VN v${{ github.ref_name }}"
          releaseBody: |
            ## ResearchMind VN v${{ github.ref_name }}

            Tải xuống phiên bản phù hợp với hệ điều hành của bạn.
          includeDebug: false
