name: Lint & Test

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/desktop/"
      - "backend/"
      - "docs/"
      - ".github/"
      - "Cargo.toml"
      - "Cargo.lock"
      - "backend.spec"
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/desktop/src/**'
              - 'apps/desktop/package.json'
              - 'apps/desktop/pnpm-lock.yaml'
              - 'apps/desktop/vite.config.ts'
              - 'apps/desktop/tsconfig.json'
            backend:
              - 'backend/**'
              - 'backend.spec'
            rust:
              - 'apps/desktop/src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  lint-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - run: npx tsc --noEmit
        working-directory: apps/desktop

      - run: npx vitest run
        working-directory: apps/desktop

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r backend/requirements.txt pytest pytest-timeout

      - run: pytest test_debate.py test_all_exports.py test_docx_export.py test_html_export.py test_pdf_export.py -v --timeout=120

  lint-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo clippy -- -D warnings

      - run: cargo fmt --check