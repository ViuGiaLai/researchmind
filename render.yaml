services:
  - type: web
    name: researchmind-api
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    disk:
      name: researchmind-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: EMBEDDING_MODE
        value: cloud
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIM
        value: "768"
      - key: ENABLE_RERANKER
        value: "false"
      - key: RESEARCHMIND_CORS_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_AUTH_ENABLED
        value: "true"
      - key: HOSTED_RESEARCH_ENABLED
        value: "false"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/firebase-service-account.json
