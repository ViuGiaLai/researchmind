services:
  - type: web
    name: researchmind-api
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    disk:
      name: researchmind-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: EMBEDDING_MODE
        value: cloud
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIM
        value: "768"
      - key: ENABLE_RERANKER
        value: "false"
      - key: RESEARCHMIND_CORS_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_AUTH_ENABLED
        value: "true"
      - key: HOSTED_RESEARCH_ENABLED
        value: "false"
      - key: OPENROUTER_R1_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: GITHUB_API_KEY
        sync: false
      - key: GITHUB_MODEL
        value: gpt-4o-mini
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: moonshotai/kimi-k2.6
      - key: NVIDIA_DEEPSEEK_API_KEY
        sync: false
      - key: NVIDIA_DEEPSEEK_MODEL
        value: deepseek-ai/deepseek-v4-pro
      - key: ROUTING_POLICY
        value: '{"chat.fast":["gemini","github","groq"],"chat.deep":["deepseek","openrouter","nvidia_deepseek","gemini"],"chat.deep_plus":["openrouter_r1","deepseek","nvidia_deepseek","gemini"],"rag.fast":["gemini","groq","cerebras"],"rag.deep":["deepseek","gemini","nvidia"],"rag.deep_plus":["openrouter_r1","deepseek","gemini"],"review_outline":["groq","gemini","cerebras"],"review_section":["nvidia_deepseek","deepseek","gemini","groq"],"review":["nvidia_deepseek","deepseek","gemini"],"verify":["gemini","deepseek","groq"],"critique":["gemini","deepseek","nvidia"],"debate":["nvidia_deepseek","deepseek","gemini"],"summary":["groq","gemini","cerebras"],"quality_check":["github","gemini","groq"],"translate":["gemini","groq"],"entity":["cerebras","groq"],"research":["deepseek","groq","gemini"],"synthesis":["deepseek","groq","gemini"],"daily_reader":["github","gemini","groq"],"gap":["deepseek","nvidia_deepseek","gemini"],"insight":["github","gemini","groq"]}'
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/firebase-service-account.json

  - type: web
    name: researchmind-gateway
    runtime: docker
    plan: starter
    healthCheckPath: /v1/health
    dockerfilePath: ./cloud_gateway/Dockerfile
    dockerContext: .
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: GATEWAY_SHARED_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CLOUDFLARE_API_KEY
        sync: false
      - key: CLOUDFLARE_URL
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: OPENROUTER_R1_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: GITHUB_API_KEY
        sync: false
      - key: GITHUB_MODEL
        value: gpt-4o-mini
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: moonshotai/kimi-k2.6
      - key: NVIDIA_DEEPSEEK_API_KEY
        sync: false
      - key: NVIDIA_DEEPSEEK_MODEL
        value: deepseek-ai/deepseek-v4-pro
      - key: ROUTING_POLICY
        value: '{"chat.fast":["gemini","github","groq"],"chat.deep":["deepseek","openrouter","nvidia_deepseek","gemini"],"chat.deep_plus":["openrouter_r1","deepseek","nvidia_deepseek","gemini"],"rag.fast":["gemini","groq","cerebras"],"rag.deep":["deepseek","gemini","nvidia"],"rag.deep_plus":["openrouter_r1","deepseek","gemini"],"review_outline":["groq","gemini","cerebras"],"review_section":["nvidia_deepseek","deepseek","gemini","groq"],"review":["nvidia_deepseek","deepseek","gemini"],"verify":["gemini","deepseek","groq"],"critique":["gemini","deepseek","nvidia"],"debate":["nvidia_deepseek","deepseek","gemini"],"summary":["groq","gemini","cerebras"],"quality_check":["github","gemini","groq"],"translate":["gemini","groq"],"entity":["cerebras","groq"],"research":["deepseek","groq","gemini"],"synthesis":["deepseek","groq","gemini"],"daily_reader":["github","gemini","groq"],"gap":["deepseek","nvidia_deepseek","gemini"],"insight":["github","gemini","groq"]}'
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
